# Go code generation configuration
# Usage: buf generate --template buf/buf.gen.go.yaml
version: v2
managed:
  enabled: true
plugins:
  # Protocol Buffers for Go
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative
  # gRPC for Go
  - remote: buf.build/grpc/go
    out: gen/go
    opt: paths=source_relative
