# C# code generation configuration
# Usage: buf generate --template buf/buf.gen.csharp.yaml
version: v2
managed:
  enabled: true
plugins:
  # Protocol Buffers for C#
  - remote: buf.build/protocolbuffers/csharp
    out: gen/csharp
  # gRPC for C#
  - remote: buf.build/grpc/csharp
    out: gen/csharp
