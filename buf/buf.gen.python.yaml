# Python code generation configuration
# Usage: buf generate --template buf/buf.gen.python.yaml
version: v2
managed:
  enabled: true
plugins:
  # Protocol Buffers for Python
  - remote: buf.build/protocolbuffers/python
    out: gen/python
  # gRPC for Python
  - remote: buf.build/grpc/python
    out: gen/python
